<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CardSum Lens</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">QR nutrition scanner</p>
        <h1>CardSum Lens</h1>
      </div>
      <div class="status-pill" id="cameraStatus">カメラ停止中</div>
    </header>

    <main class="app-shell">
      <section class="scanner-panel" aria-labelledby="scannerTitle">
        <div class="panel-heading">
          <div>
            <h2 id="scannerTitle">カード読み取り</h2>
            <p>QR形式: <code>card001,rice,150,234,55.7,3.8</code></p>
          </div>
          <button class="primary-button" id="toggleCameraButton" type="button">カメラ起動</button>
        </div>

        <div class="video-frame">
          <video id="cameraVideo" playsinline muted></video>
          <canvas id="scanCanvas" hidden></canvas>
          <div class="scan-reticle" aria-hidden="true"></div>
          <p class="video-placeholder" id="videoPlaceholder">
            カメラ利用時は HTTPS または localhost で開いてください。
          </p>
        </div>

        <form class="manual-entry" id="manualForm">
          <label for="manualInput">手入力</label>
          <div class="entry-row">
            <input
              id="manualInput"
              name="manualInput"
              type="text"
              inputmode="text"
              placeholder="card001,rice,150,234,55.7,3.8"
              autocomplete="off"
            >
            <button type="submit">追加</button>
          </div>
          <p class="helper-text">1行に1カード分を入力してください。</p>
        </form>

        <div class="import-block">
          <div>
            <p class="import-title">CSV取込</p>
            <p class="helper-text">ヘッダーあり・なしのどちらでも取り込めます。</p>
          </div>
          <button class="secondary-button" id="importButton" type="button">CSVを選択</button>
          <input id="importInput" type="file" accept=".csv,text/csv" hidden>
        </div>

        <div class="message-area" id="messageArea" role="status" aria-live="polite"></div>
      </section>

      <section class="summary-panel" aria-labelledby="summaryTitle">
        <div class="panel-heading">
          <div>
            <h2 id="summaryTitle">栄養サマリー</h2>
            <p id="summaryHeading">カードはまだありません</p>
          </div>
          <button class="ghost-button" id="resetButton" type="button">リセット</button>
        </div>

        <div class="totals-grid">
          <div class="metric">
            <span>枚数</span>
            <strong id="cardCount">0</strong>
          </div>
          <div class="metric">
            <span>カロリー (kcal)</span>
            <strong id="caloriesValue">0</strong>
          </div>
          <div class="metric">
            <span>炭水化物 (g)</span>
            <strong id="carbsValue">0</strong>
          </div>
          <div class="metric">
            <span>タンパク質 (g)</span>
            <strong id="proteinValue">0</strong>
          </div>
        </div>

        <div class="table-tools">
          <button class="secondary-button" id="exportButton" type="button">CSV書き出し</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>カードID</th>
                <th>名称</th>
                <th>グラム数</th>
                <th>カロリー</th>
                <th>炭水化物</th>
                <th>タンパク質</th>
                <th>読取時刻</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cardsTableBody">
              <tr class="empty-row">
                <td colspan="8">まだカードが追加されていません。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
